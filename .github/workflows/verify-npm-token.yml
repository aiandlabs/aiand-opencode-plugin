name: Verify NPM token

on:
  push:
    branches: [npm-publish]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: whoami and @aiand access
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "token authenticates as: $(npm whoami)"
          echo "--- @aiand org membership ---"
          npm org ls aiand || echo "npm org ls failed (token may be granular/automation-scoped without org read — not necessarily a publish blocker)"

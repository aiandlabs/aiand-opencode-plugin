name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write # create the release tag
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Skip if this version is already on npm
        id: gate
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PUBLISHED="$(npm view "@aiand/opencode-plugin@$VERSION" version 2>/dev/null || true)"
          if [ -n "$PUBLISHED" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "@aiand/opencode-plugin@$VERSION already on npm — nothing to publish"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.release == 'true'
        run: npm install
      - if: steps.gate.outputs.release == 'true'
        run: npm run build
      - if: steps.gate.outputs.release == 'true'
        run: npm run check:dist
      - if: steps.gate.outputs.release == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: steps.gate.outputs.release == 'true'
        run: gh release create "v${{ steps.gate.outputs.version }}" --generate-notes --title "v${{ steps.gate.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}
